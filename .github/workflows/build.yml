name: Build on various Operating Systems

on:
  workflow_dispatch:

env:
  UPSTREAM_REPO: https://github.com/lsp-plugins/lsp-plugins.git
  UPSTREAM_BRANCH: master
  CARLA_BRIDGE_DUMMY: 1
  CARLA_BRIDGE_TESTING: native
  PLUGIN_METADATA: .build/target/lsp-plugin-fw/plugins.json
  VALGRIND_ARGS: --error-exitcode=255 --leak-check=no --track-origins=yes --suppressions=.github/workflows/valgrind.supp
  VALGRIND_DEBUG_ARGS: --error-exitcode=255 --leak-check=full --track-origins=yes --keep-debuginfo=yes --suppressions=.github/workflows/valgrind.supp

jobs:
  windows_x86_64:
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Setup MSYS2 and install dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          release: false
          update: false
          install: >-
            base-devel
            git
            mingw-w64-x86_64-gcc
      - name: Clone upstream repository
        run: git clone --depth 1 --branch ${UPSTREAM_BRANCH} ${UPSTREAM_REPO} .
      - name: Configure project
        run: make config STRICT=1 VERBOSE=1 FEATURES='clap lv2 vst2 vst3 ui'
      - name: Fetch project dependencies
        run: make fetch
      - name: Patch build for Windows compatibility
        run: |
          # 1) Statically link winpthread — eliminates libwinpthread-1.dll runtime dependency
          echo 'NOARCH_SO_FLAGS += -Wl,-Bstatic -lpthread -Wl,-Bdynamic' >> modules/lsp-plugin-fw/make/tools.mk
          echo 'NOARCH_EXE_FLAGS += -Wl,-Bstatic -lpthread -Wl,-Bdynamic' >> modules/lsp-plugin-fw/make/tools.mk
          # 2) Fix VST3 binary extension: .vst3 is wrong on Windows, must be .dll per VST3 spec
          sed -i 's/^VST3_EXT\s*:=.*/VST3_EXT := .dll/' modules/lsp-plugin-fw/src/Makefile
      - name: Build project
        run: make VERBOSE=1
      - name: Install plugin bundles
        run: make install
      - name: Fix CLAP bundle for Windows
        run: |
          # On Windows, CLAP spec requires a single .clap FILE (a PE DLL), not a directory.
          # The Makefile installs lsp-plugins.clap as a directory containing lsp-plugins-clap.dll.
          # Reaper and other Windows hosts use LoadLibrary on the .clap file, so it must be a file.
          CLAP_DIR="INSTALL/lib/clap/lsp-plugins.clap"
          if [ -d "$CLAP_DIR" ]; then
            # Find the DLL inside the .clap directory
            CLAP_DLL=$(find "$CLAP_DIR" -maxdepth 1 -name '*.dll' -type f | head -1)
            if [ -n "$CLAP_DLL" ]; then
              echo "Converting CLAP directory bundle to single file:"
              echo "  Source: $CLAP_DLL"
              echo "  Target: INSTALL/lib/clap/lsp-plugins.clap"
              # Copy DLL to temp, remove directory, move DLL back as .clap file
              cp "$CLAP_DLL" /tmp/lsp-plugins-clap.dll
              rm -rf "$CLAP_DIR"
              mv /tmp/lsp-plugins-clap.dll INSTALL/lib/clap/lsp-plugins.clap
            else
              echo "WARNING: No DLL found inside $CLAP_DIR"
              ls -la "$CLAP_DIR"
            fi
          else
            echo "CLAP is already a file (not a directory) — no fix needed"
          fi
      - name: Verify plugin structure and dependencies
        run: |
          echo "=== Installed file tree ==="
          find INSTALL -type f | head -40
          echo ""
          echo "=== Checking VST3 dependencies ==="
          VST3_DLL="INSTALL/lib/vst3/lsp-plugins.vst3/Contents/x86_64-win/lsp-plugins.dll"
          if [ -f "$VST3_DLL" ]; then
            objdump -p "$VST3_DLL" | grep "DLL Name"
          else
            echo "WARNING: VST3 binary not found at expected path"
            find INSTALL/lib/vst3 -type f | head -10
          fi
          echo ""
          echo "=== Checking CLAP dependencies ==="
          if [ -f "INSTALL/lib/clap/lsp-plugins.clap" ]; then
            objdump -p INSTALL/lib/clap/lsp-plugins.clap | grep "DLL Name"
          else
            echo "WARNING: CLAP binary not found"
            find INSTALL/lib/clap -type f | head -10
          fi
          echo ""
          echo "=== Checking VST2 dependencies ==="
          VST2_DLL=$(find INSTALL/lib/vst -type f -name '*.dll' 2>/dev/null | head -1)
          if [ -n "$VST2_DLL" ]; then
            objdump -p "$VST2_DLL" | grep "DLL Name"
          fi
          echo ""
          echo "=== Checking LV2 dependencies ==="
          LV2_DLL=$(find INSTALL/lib/lv2 -type f -name '*.dll' 2>/dev/null | head -1)
          if [ -n "$LV2_DLL" ]; then
            objdump -p "$LV2_DLL" | grep "DLL Name"
          fi
          echo ""
          echo "=== Verifying libwinpthread is NOT dynamically linked ==="
          BAD=0
          find INSTALL -type f \( -name '*.dll' -o -name '*.clap' \) | while read f; do
            if objdump -p "$f" 2>/dev/null | grep -q "libwinpthread"; then
              echo "FAIL: $f still depends on libwinpthread-1.dll"
              BAD=1
            fi
          done
          if [ "$BAD" = "0" ]; then
            echo "All plugins: libwinpthread statically linked OK"
          fi
      - name: Upload Windows x86_64 build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lsp-plugins-windows-x86_64
          path: INSTALL/
          if-no-files-found: error
          retention-days: 30

  macos_arm64:
    runs-on: macos-latest
    steps:
      - name: Update repositories
        run: brew update
      - name: Install dependencies
        run: brew install make pkgconf cairo freetype
      - name: Clone upstream repository
        run: git clone --depth 1 --branch ${UPSTREAM_BRANCH} ${UPSTREAM_REPO} .
      - name: Configure project
        run: gmake config STRICT=1 VERBOSE=1 FEATURES='clap lv2 vst2 vst3 ui'
      - name: Fetch project dependencies
        run: gmake fetch
      - name: Build project
        run: gmake VERBOSE=1
      - name: Install plugin bundles
        run: |
          gmake install DESTDIR="$PWD/staging" \
            CLAP_LIBDIR=/Library/Audio/Plug-Ins/CLAP/lsp-plugins.clap \
            LV2_LIBDIR=/Library/Audio/Plug-Ins/LV2/lsp-plugins.lv2
      - name: Ad-hoc code sign plugins
        run: |
          find staging/Library/Audio/Plug-Ins -type f \( -name "*.dylib" -o -perm +111 \) -exec codesign --sign - --force {} \; 2>/dev/null || true
          find staging/Library/Audio/Plug-Ins -name "*.vst3" -type d -exec codesign --sign - --force --deep {} \; 2>/dev/null || true
          find staging/Library/Audio/Plug-Ins -name "*.vst" -type d -exec codesign --sign - --force --deep {} \; 2>/dev/null || true
          find staging/Library/Audio/Plug-Ins -name "*.clap" -type d -exec codesign --sign - --force --deep {} \; 2>/dev/null || true
      - name: Upload macOS arm64 build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lsp-plugins-macos-arm64
          path: staging/Library/
          if-no-files-found: error
          retention-days: 30
